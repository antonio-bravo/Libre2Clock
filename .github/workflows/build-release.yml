name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (dejar vacio para usar 1.YYYYMMDD.HHmmss)"
        required: false
        default: ""

env:
  JAVA_TOOL_OPTIONS: "-Djava.awt.headless=true"
  NODE_OPTIONS: "--no-deprecation"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set Version
        id: set_version
        run: |
          if [ -z "${{ github.event.inputs.version }}" ]; then
            V_AUTO="1.$(date -u +'%Y%m%d.%H%M%S')"
            echo "VERSION=$V_AUTO" >> "$GITHUB_ENV"
          else
            echo "VERSION=${{ github.event.inputs.version }}" >> "$GITHUB_ENV"
          fi

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: |
          ./gradlew \
            --no-daemon \
            --no-configuration-cache \
            --no-parallel \
            -Djava.awt.headless=true \
            -Dkotlin.daemon.enabled=false \
            -Pkotlin.incremental=false \
            clean assembleRelease

      - name: Build Debug APK
        run: |
          ./gradlew \
            --no-daemon \
            --no-configuration-cache \
            --no-parallel \
            -Djava.awt.headless=true \
            -Dkotlin.daemon.enabled=false \
            -Pkotlin.incremental=false \
            assembleDebug

      - name: Prepare APK for Release
        run: |
          RELEASE_APK=$(find app/build/outputs/apk/release/ -name "*.apk" | head -n 1)
          if [ -f "$RELEASE_APK" ]; then
            echo "APK de release encontrado en $RELEASE_APK"
            cp "$RELEASE_APK" "libre2clock-v${{ env.VERSION }}.apk"
          else
            echo "Error: No se encontro el APK de release. Revisa el log de Gradle."
            exit 1
          fi

          DEBUG_APK=$(find app/build/outputs/apk/debug/ -name "*.apk" | head -n 1)
          if [ -f "$DEBUG_APK" ]; then
            echo "APK debug encontrado en $DEBUG_APK"
            cp "$DEBUG_APK" "libre2clock-v${{ env.VERSION }}_debug.apk"
          else
            echo "Error: No se encontro el APK debug. Revisa el log de Gradle."
            exit 1
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ env.VERSION }}" \
            --title "Libre2Clock v${{ env.VERSION }}" \
            --generate-notes \
            "libre2clock-v${{ env.VERSION }}.apk" \
            "libre2clock-v${{ env.VERSION }}_debug.apk"
